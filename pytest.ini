[pytest]
addopts = -v --html=reports/report.html --self-contained-html --alluredir=reports/allure_results
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO
log_file = reports/run.log
log_file_level = DEBUG
markers =
    e2e: end-to-end browser scenario